name: Web Build

on:
  workflow_call:
  workflow_dispatch:

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load JSON variables
        id: vars
        run: |
          echo "version=$(jq -r '.version' td-version.json)" >> $GITHUB_ENV
          echo "commit_hash=$(jq -r '.commit_hash' td-version.json)" >> $GITHUB_ENV

      - name: Run Web Build Script
        run: bash scripts/web/build.sh

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: web-${{ env.version }}-${{ env.commit_hash }}
          name: WebAssembly ${{ env.version }}-${{ env.commit_hash }}
          body: https://github.com/tdlib/td/tree/${{ env.commit_hash }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: 'td/build/tdlib.zip'
          allowUpdates: true
