name: iOS Build

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load JSON variables
        id: vars
        run: |
          echo "version=$(jq -r '.version' td-version.json)" >> $GITHUB_ENV
          echo "commit_hash=$(jq -r '.commit_hash' td-version.json)" >> $GITHUB_ENV

      - name: Run iOS Build Script
        run: bash scripts/ios/build.sh

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ios-td-v${{ env.version }}
          name: iOS-Binaries-td-v${{ env.version }}
          body: |
            Pre-compiled TDLib iOS XCFramework (tdjson.xcframework) for device and simulator.
            Source commit: https://github.com/tdlib/td/tree/${{ env.commit_hash }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: 'tdjson.xcframework.zip'
          allowUpdates: true
          omitSourceCodeArtifacts: true
